name: Autograding Tests

'on':
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_core.txt

    - name: Environment check
      id: environment-check
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Environment check
        command: python src/env_check.py
        timeout: 20
        max-score: 10

    - name: Hello NLP script
      id: hello-nlp-script
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Hello NLP script
        command: python src/hello_nlp.py
        timeout: 20
        max-score: 10

    - name: Pytest suite
      id: pytest-suite
      uses: classroom-resources/autograding-python-grader@v1
      with:
        timeout: 20
        max-score: 80

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        ENVIRONMENT-CHECK_RESULTS: "${{steps.environment-check.outputs.result}}"
        HELLO-NLP-SCRIPT_RESULTS: "${{steps.hello-nlp-script.outputs.result}}"
        PYTEST-SUITE_RESULTS: "${{steps.pytest-suite.outputs.result}}"
      with:
        runners: environment-check,hello-nlp-script,pytest-suite
